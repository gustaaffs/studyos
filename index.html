<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="theme-color" content="#050810"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Life OS — Casal</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&family=Bricolage+Grotesque:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
/* ══ TOKENS ══════════════════════════════════════════════ */
:root{
  --bg:#050810;--bg2:#080d16;--bg3:#0c131f;
  --panel:#101828;--panel2:#141e2d;--panel3:#192436;
  --border:#1e2f44;--border2:#2d4560;--border3:#3d5a78;
  --text:#eef4fb;--muted:#6a8aa8;--dim:#3d5368;
  --blue:#38bdf8;--blue2:#0ea5e9;
  --green:#34d399;--green2:#10b981;
  --orange:#fb923c;--orange2:#f97316;
  --purple:#a78bfa;--purple2:#8b5cf6;
  --red:#f87171;--red2:#ef4444;
  --yellow:#fbbf24;
  --gold:#f59e0b;
  --r:18px;--r2:24px;--r3:30px;
  --sh:0 4px 24px rgba(0,0,0,.35);
  --sh2:0 8px 40px rgba(0,0,0,.5);
  --safe-b:env(safe-area-inset-bottom,0px);
  --safe-t:env(safe-area-inset-top,0px);
  --font-display:'Bricolage Grotesque',system-ui,sans-serif;
  --font-body:'Bricolage Grotesque',system-ui,sans-serif;
  --font-mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--font-body);-webkit-font-smoothing:antialiased}
button,input,select,textarea{font-family:var(--font-body);font-size:inherit}
button{cursor:pointer}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}
img{max-width:100%}

/* ══ LAYOUT ══════════════════════════════════════════════ */
.shell{display:flex;min-height:100vh}
.sidebar{
  width:260px;flex:0 0 260px;
  position:fixed;inset:0 auto 0 0;
  background:rgba(8,13,22,.97);
  border-right:1px solid var(--border);
  padding:calc(24px + var(--safe-t)) 16px 24px;
  overflow-y:auto;display:flex;flex-direction:column;gap:6px;
  backdrop-filter:blur(20px);
}
.main{margin-left:260px;min-height:100vh;padding:28px 32px calc(40px + var(--safe-b));display:flex;flex-direction:column;gap:0}

/* ══ LOGO ═════════════════════════════════════════════════ */
.logo{
  font-family:var(--font-display);font-size:26px;font-weight:800;
  letter-spacing:-1px;padding:0 6px 20px;
  background:linear-gradient(135deg,var(--blue) 0%,var(--green) 60%,var(--gold) 100%);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
}

/* ══ NAV ══════════════════════════════════════════════════ */
.nav-section{font-size:10px;letter-spacing:2.5px;color:var(--dim);text-transform:uppercase;padding:10px 8px 6px;font-family:var(--font-mono)}
.nav-btn{
  display:flex;align-items:center;gap:11px;width:100%;
  background:transparent;border:1px solid transparent;
  border-radius:var(--r);padding:11px 14px;
  color:var(--muted);font-weight:600;font-size:14px;
  transition:all .18s cubic-bezier(.4,0,.2,1);text-align:left;
}
.nav-btn:hover{color:var(--text);background:var(--panel);border-color:var(--border)}
.nav-btn.active{color:var(--blue);background:rgba(56,189,248,.1);border-color:rgba(56,189,248,.25)}
.nav-btn .icon{font-size:18px;width:22px;text-align:center}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:800;padding:2px 7px;border-radius:99px;min-width:18px;text-align:center}

.sync-pill{
  display:flex;align-items:center;gap:8px;
  background:var(--panel);border:1px solid var(--border);
  border-radius:var(--r);padding:10px 12px;margin-top:auto;
  font-size:12px;color:var(--muted);
}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:background .3s}
.sync-dot.ok{background:var(--green);box-shadow:0 0 6px var(--green)}
.sync-dot.err{background:var(--red)}
.sync-dot.syncing{background:var(--yellow);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ══ PAGE HEADER ══════════════════════════════════════════ */
.page-header{
  display:flex;align-items:flex-start;justify-content:space-between;
  margin-bottom:24px;gap:16px;flex-wrap:wrap;
}
.page-title{font-family:var(--font-display);font-size:28px;font-weight:800;letter-spacing:-.5px}
.page-sub{font-size:14px;color:var(--muted);margin-top:3px}

/* ══ HERO BAR ═════════════════════════════════════════════ */
.hero-bar{
  display:grid;grid-template-columns:repeat(4,1fr);gap:14px;
  background:var(--panel);border:1px solid var(--border);
  border-radius:var(--r2);padding:20px 24px;margin-bottom:22px;
  box-shadow:var(--sh);
}
.hero-metric .lbl{font-size:12px;color:var(--muted);letter-spacing:.5px;margin-bottom:5px}
.hero-metric .val{font-size:26px;font-weight:800;font-family:var(--font-display);letter-spacing:-1px;line-height:1}
.hero-metric .val.g{color:var(--green)}
.hero-metric .val.r{color:var(--red)}
.hero-metric .val.o{color:var(--orange)}
.hero-metric .val.b{color:var(--blue)}
.hero-metric .val.p{color:var(--purple)}
.hero-metric .sub{font-size:12px;color:var(--dim);margin-top:3px}

/* ══ CARDS / GRID ═════════════════════════════════════════ */
.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:16px;margin-bottom:16px}
.card{background:var(--panel);border:1px solid var(--border);border-radius:var(--r2);padding:20px;min-width:0;overflow:hidden}
.card-title{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);font-family:var(--font-mono);margin-bottom:16px;font-weight:500}
.s3{grid-column:span 3}.s4{grid-column:span 4}.s5{grid-column:span 5}.s6{grid-column:span 6}
.s7{grid-column:span 7}.s8{grid-column:span 8}.s9{grid-column:span 9}.s12{grid-column:span 12}

/* ══ TABS ══════════════════════════════════════════════════ */
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px;padding:4px;background:var(--panel);border:1px solid var(--border);border-radius:var(--r);width:fit-content}
.tab{
  border:none;background:transparent;color:var(--muted);
  border-radius:11px;padding:8px 14px;font-weight:600;font-size:13px;
  transition:all .15s;white-space:nowrap;
}
.tab.on{background:var(--panel3);color:var(--text);box-shadow:var(--sh)}
.tab:hover:not(.on){color:var(--text)}

/* ══ BUTTONS ══════════════════════════════════════════════ */
.btn{
  border:none;border-radius:var(--r);padding:10px 18px;
  font-weight:700;font-size:13px;background:var(--blue);color:#001622;
  transition:all .15s;display:inline-flex;align-items:center;gap:7px;white-space:nowrap;
}
.btn:hover{filter:brightness(1.1);transform:translateY(-1px)}
.btn:active{transform:none;filter:brightness(.95)}
.btn.sm{padding:7px 13px;font-size:12px;border-radius:11px}
.btn.g{background:var(--green);color:#001810}
.btn.o{background:var(--orange);color:#1a0800}
.btn.r{background:var(--red);color:#1a0000}
.btn.p{background:var(--purple);color:#0d0018}
.btn.ghost{background:transparent;border:1px solid var(--border2);color:var(--muted)}
.btn.ghost:hover{border-color:var(--border3);color:var(--text);background:var(--panel2)}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}

/* ══ FORMS ════════════════════════════════════════════════ */
.fg{display:grid;grid-template-columns:repeat(12,1fr);gap:10px;margin-bottom:12px}
.f3{grid-column:span 3}.f4{grid-column:span 4}.f6{grid-column:span 6}.f8{grid-column:span 8}.f12{grid-column:span 12}
.label{font-size:11px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-bottom:5px;display:block;font-family:var(--font-mono)}
.inp,.sel{
  width:100%;background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--r);color:var(--text);padding:10px 13px;font-size:14px;
  transition:border-color .15s;outline:none;
}
.inp:focus,.sel:focus{border-color:var(--blue)}
.inp.sm{padding:7px 10px;font-size:13px}

/* ══ ROW CARDS ════════════════════════════════════════════ */
.row{
  background:var(--panel2);border:1px solid rgba(255,255,255,.03);
  border-radius:var(--r);padding:13px 15px;
  display:flex;align-items:center;gap:12px;margin-bottom:8px;
  transition:border-color .15s;
}
.row:hover{border-color:var(--border)}
.row-title{font-weight:700;font-size:15px}
.row-sub{color:var(--muted);font-size:12px;margin-top:2px}
.row-val{font-weight:800;font-size:16px;font-family:var(--font-mono);white-space:nowrap}

/* ══ PILLS / BADGES ═══════════════════════════════════════ */
.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:700;border:1px solid;white-space:nowrap}
.pill.b{color:var(--blue);border-color:rgba(56,189,248,.3);background:rgba(56,189,248,.1)}
.pill.g{color:var(--green);border-color:rgba(52,211,153,.3);background:rgba(52,211,153,.1)}
.pill.o{color:var(--orange);border-color:rgba(251,146,60,.3);background:rgba(251,146,60,.1)}
.pill.p{color:var(--purple);border-color:rgba(167,139,250,.3);background:rgba(167,139,250,.1)}
.pill.r{color:var(--red);border-color:rgba(248,113,113,.3);background:rgba(248,113,113,.1)}
.pill.y{color:var(--yellow);border-color:rgba(251,191,36,.3);background:rgba(251,191,36,.1)}
.pill.dim{color:var(--muted);border-color:var(--border);background:var(--panel2)}

/* ══ PROGRESS BAR ═════════════════════════════════════════ */
.bar{height:8px;background:var(--bg);border-radius:99px;overflow:hidden;margin:6px 0}
.bar-fill{height:100%;border-radius:99px;transition:width .6s cubic-bezier(.4,0,.2,1)}

/* ══ TABLE ════════════════════════════════════════════════ */
.tbl-wrap{overflow:auto;max-width:100%;border-radius:var(--r);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;min-width:480px}
th{background:var(--panel2);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);padding:11px 14px;text-align:left;font-family:var(--font-mono);font-weight:500}
td{padding:11px 14px;border-bottom:1px solid var(--border);font-size:14px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.015)}
td.num{font-family:var(--font-mono);font-weight:700;white-space:nowrap}
td.num.g{color:var(--green)}td.num.r{color:var(--red)}td.num.o{color:var(--orange)}

/* ══ MONTH CARDS ══════════════════════════════════════════ */
.month-grid{display:grid;gap:10px}
.mcard{
  background:var(--panel2);border:1px solid var(--border);
  border-radius:var(--r2);padding:16px 20px;
  display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr auto;
  align-items:center;gap:16px;cursor:pointer;transition:all .15s;
}
.mcard:hover{border-color:var(--border2);transform:translateY(-1px)}
.mcard.active{border-color:var(--blue);background:rgba(56,189,248,.06)}
.mcard-title{font-size:17px;font-weight:800;font-family:var(--font-display)}
.mcard-sub{font-size:12px;color:var(--muted);margin-top:3px;display:flex;gap:8px;flex-wrap:wrap}
.mkpi{font-size:11px;padding:3px 7px;border-radius:99px;background:rgba(255,255,255,.04);color:var(--muted)}
.mcard-stat .lbl{font-size:11px;color:var(--muted);margin-bottom:2px}
.mcard-stat .val{font-size:16px;font-weight:800;font-family:var(--font-mono)}
.mcard-stat .val.g{color:var(--green)}.mcard-stat .val.r{color:var(--red)}

/* ══ COMPARE GRID ═════════════════════════════════════════ */
.cmp-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cmp-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.cmp-box .n{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;font-family:var(--font-mono)}
.cmp-box .v{font-size:22px;font-weight:800;font-family:var(--font-display);margin-top:4px;letter-spacing:-.5px}
.cmp-box.hi{border-color:var(--green);background:rgba(52,211,153,.05)}
.cmp-box.lo{border-color:var(--red);background:rgba(248,113,113,.05)}

/* ══ ALERTS ═══════════════════════════════════════════════ */
.alert{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border-radius:var(--r);margin-bottom:8px;font-size:13px;border:1px solid}
.alert.warn{background:rgba(251,146,60,.08);border-color:rgba(251,146,60,.25);color:var(--orange)}
.alert.info{background:rgba(56,189,248,.08);border-color:rgba(56,189,248,.25);color:var(--blue)}
.alert.good{background:rgba(52,211,153,.08);border-color:rgba(52,211,153,.25);color:var(--green)}
.alert.bad{background:rgba(248,113,113,.08);border-color:rgba(248,113,113,.25);color:var(--red)}
.alert-icon{font-size:16px;flex-shrink:0;margin-top:1px}

/* ══ SVG CHART ════════════════════════════════════════════ */
.chart-wrap{overflow-x:auto}
svg.chart{display:block}

/* ══ GOAL ROWS ════════════════════════════════════════════ */
.goal-row{margin-bottom:18px}
.goal-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.goal-name{font-weight:700;font-size:15px}
.goal-pct{font-size:13px;color:var(--muted);font-family:var(--font-mono)}
.goal-meta{font-size:12px;color:var(--dim);margin-top:4px}

/* ══ TOGGLE / SWITCH ══════════════════════════════════════ */
.toggle{position:relative;display:inline-block;width:38px;height:22px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:var(--border2);border-radius:99px;transition:.25s;cursor:pointer}
.toggle-slider:before{content:"";position:absolute;height:16px;width:16px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.25s}
.toggle input:checked+.toggle-slider{background:var(--green)}
.toggle input:checked+.toggle-slider:before{transform:translateX(16px)}

/* ══ TASK CHECK ═══════════════════════════════════════════ */
.task-chk{
  width:22px;height:22px;border-radius:7px;border:2px solid var(--border2);
  background:transparent;color:#001810;font-weight:900;font-size:13px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;
}
.task-chk.done{background:var(--green);border-color:var(--green)}

/* ══ MODAL ════════════════════════════════════════════════ */
.modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,.75);
  display:none;align-items:center;justify-content:center;
  padding:20px;z-index:200;backdrop-filter:blur(4px);
}
.modal-bg.open{display:flex}
.modal-box{
  background:var(--panel);border:1px solid var(--border2);
  border-radius:var(--r3);padding:26px;width:100%;
  max-width:680px;max-height:88vh;overflow-y:auto;
  box-shadow:var(--sh2);animation:mslide .22s cubic-bezier(.4,0,.2,1);
}
@keyframes mslide{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.modal-title{font-size:20px;font-weight:800;margin-bottom:18px;font-family:var(--font-display)}

/* ══ ONBOARDING ═══════════════════════════════════════════ */
.ob-wrap{
  position:fixed;inset:0;background:var(--bg);z-index:300;
  display:flex;align-items:center;justify-content:center;padding:24px;
}
.ob-box{
  background:var(--panel);border:1px solid var(--border2);
  border-radius:var(--r3);padding:36px;width:100%;max-width:560px;
  box-shadow:var(--sh2);
}
.ob-step{font-size:11px;letter-spacing:2px;color:var(--muted);font-family:var(--font-mono);margin-bottom:8px}
.ob-title{font-size:28px;font-weight:800;font-family:var(--font-display);letter-spacing:-.5px;margin-bottom:6px}
.ob-sub{font-size:15px;color:var(--muted);margin-bottom:26px;line-height:1.5}
.ob-steps{display:flex;gap:6px;margin-bottom:28px}
.ob-dot{height:4px;border-radius:99px;flex:1;background:var(--border2);transition:background .3s}
.ob-dot.done{background:var(--green)}.ob-dot.active{background:var(--blue)}

/* ══ TOAST ════════════════════════════════════════════════ */
.toast{
  position:fixed;bottom:calc(24px + var(--safe-b));right:24px;
  background:var(--panel3);border:1px solid var(--border2);
  border-radius:var(--r);padding:12px 18px;
  font-size:13px;font-weight:600;
  opacity:0;transform:translateY(8px);
  pointer-events:none;transition:.22s;z-index:500;
  max-width:320px;box-shadow:var(--sh2);
}
.toast.show{opacity:1;transform:none}
.toast.ok{border-color:rgba(52,211,153,.4);color:var(--green)}
.toast.err{border-color:rgba(248,113,113,.4);color:var(--red)}

/* ══ PRINT ════════════════════════════════════════════════ */
@media print{
  .sidebar,.tabs,.btn,.btn-row,.modal-bg,.toast,.ob-wrap{display:none!important}
  .main{margin:0;padding:20px}
  .card,.hero-bar{box-shadow:none;border:1px solid #ccc}
}

/* ══ RESPONSIVE ═══════════════════════════════════════════ */
@media(max-width:1200px){
  .hero-bar{grid-template-columns:repeat(2,1fr)}
  .s3,.s4,.s5,.s6,.s7,.s8{grid-column:span 6}
  .mcard{grid-template-columns:1fr 1fr 1fr;gap:10px}
  .mcard>:last-child{grid-column:span 3}
}
@media(max-width:820px){
  .shell{display:block}
  .sidebar{
    position:sticky;top:0;width:100%;height:auto;
    flex-direction:row;flex-wrap:wrap;align-items:center;
    padding:calc(10px + var(--safe-t)) 12px 10px;
    border-right:none;border-bottom:1px solid var(--border);
    gap:0;z-index:50;
  }
  .logo{padding-bottom:0;margin-right:12px;font-size:20px}
  .nav-section,.sync-pill{display:none}
  .nav{display:flex;gap:6px;flex-wrap:wrap}
  .nav-btn{padding:8px 12px;font-size:12px;border-radius:11px}
  .nav-btn .icon{font-size:15px;width:auto}
  .main{margin-left:0;padding:14px 12px calc(30px + var(--safe-b))}
  .hero-bar{grid-template-columns:repeat(2,1fr);padding:14px;gap:12px}
  .hero-metric .val{font-size:20px}
  .grid{grid-template-columns:1fr;gap:12px}
  .s3,.s4,.s5,.s6,.s7,.s8,.s9,.s12{grid-column:span 1}
  .mcard{grid-template-columns:1fr;gap:8px}
  .mcard>:last-child{grid-column:span 1}
  .cmp-grid{grid-template-columns:1fr}
  .fg{grid-template-columns:1fr}
  .f3,.f4,.f6,.f8,.f12{grid-column:span 1}
  .tabs{width:100%}
  .btn-row .btn{flex:1}
  .toast{left:12px;right:12px;text-align:center}
  table{min-width:380px}
}
</style>
</head>
<body>

<!-- ═══ ONBOARDING ═════════════════════════════════════════ -->
<div id="ob" class="ob-wrap" style="display:none">
  <div class="ob-box">
    <div class="ob-steps" id="ob-dots"></div>
    <div id="ob-body"></div>
  </div>
</div>

<!-- ═══ SHELL ══════════════════════════════════════════════ -->
<div class="shell">
  <aside class="sidebar" id="sidebar">
    <div class="logo">Life OS</div>
    <div class="nav-section">Principal</div>
    <nav class="nav" id="nav">
      <button class="nav-btn active" data-m="finance" onclick="go('finance')"><span class="icon">💰</span> Finanças</button>
      <button class="nav-btn" data-m="home" onclick="go('home')"><span class="icon">🏠</span> Casa</button>
      <button class="nav-btn" data-m="study" onclick="go('study')"><span class="icon">📚</span> Estudos</button>
    </nav>
    <div class="nav-section">Sistema</div>
    <nav class="nav">
      <button class="nav-btn" data-m="settings" onclick="go('settings')"><span class="icon">⚙️</span> Configurações</button>
    </nav>
    <div class="sync-pill" id="sync-pill">
      <div class="sync-dot" id="sync-dot"></div>
      <span id="sync-txt" style="font-size:12px;color:var(--muted)">aguardando...</span>
    </div>
  </aside>
  <main class="main"><div id="app"></div></main>
</div>

<!-- ═══ MODALS ══════════════════════════════════════════════ -->

const BRL = new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'});
const fmt = n => BRL.format(Number(n)||0);
const fmtShort = n => {const v=Math.abs(Number(n)||0);return (n<0?'-':'')+( v>=1000?'R$'+(v/1000).toFixed(1)+'k':'R$'+v.toFixed(0));};
const esc = s => String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const monthsPT = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
const fullMonths = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const days = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

function ym(offset=0){
  const d=new Date();d.setDate(1);d.setMonth(d.getMonth()+offset);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
}
function ymLabel(key){const [y,m]=key.split('-').map(Number);return fullMonths[m-1]+' '+y;}
function shortYm(key){const [y,m]=key.split('-').map(Number);return monthsPT[m-1]+'/'+String(y).slice(2);}
function ymFrom(year,month){const d=new Date(year,month-1,1);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
function ymAdd(key,n){const [y,m]=key.split('-').map(Number);return ymFrom(y,m+n);}
function today(){return new Date().toISOString().slice(0,10);}

// ══════════════════════════════════════════════════════════
// GITHUB DB
// ══════════════════════════════════════════════════════════
const GH_OWNER='gustaaffs', GH_REPO='studyos', GH_FILE='data.json', GH_BRANCH='main';
const GH_TOKEN_KEY='lifeos_gh_token';
let GH_SHA=null, GH_READY=false;
const ghToken=()=>localStorage.getItem(GH_TOKEN_KEY)||'';
const ghConfigured=()=>ghToken().length>10;
const ghHeaders=()=>({'Authorization':'Bearer '+ghToken(),'Accept':'application/vnd.github+json','Content-Type':'application/json','X-GitHub-Api-Version':'2022-11-28'});
function enc(s){return btoa(unescape(encodeURIComponent(s)));}
function dec(s){return decodeURIComponent(escape(atob(s.replace(/\n/g,''))));}

function setSyncUI(state,msg){
  const dot=document.getElementById('sync-dot');
  const txt=document.getElementById('sync-txt');
  const main=document.getElementById('sync-status-main');
  if(dot){dot.className='sync-dot '+(state==='ok'?'ok':state==='err'?'err':state==='syncing'?'syncing':'');}
  if(txt) txt.textContent=msg;
  if(main) main.textContent=(state==='ok'?'☁️ ':state==='err'?'⚠️ ':state==='syncing'?'⏳ ':'🔑 ')+msg;
}
async function ghLoad(){
  if(!ghConfigured()){setSyncUI('err','Token não configurado');return false;}
  setSyncUI('syncing','carregando...');
  try{
    const res=await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_FILE}?ref=${GH_BRANCH}&t=${Date.now()}`,{headers:ghHeaders(),cache:'no-store'});
    if(res.status===404){GH_READY=true;GH_SHA=null;setSyncUI('ok','pronto (novo arquivo)');await ghSave();return true;}
    if(!res.ok) throw new Error('HTTP '+res.status);
    const j=await res.json(); GH_SHA=j.sha;
    const data=JSON.parse(dec(j.content));
    ST={...defaultState(),...data};
    // ensure arrays
    ['rules','entries','goals','tasks','recurring','cardExpenses'].forEach(k=>{if(!Array.isArray(ST[k]))ST[k]=defaultState()[k]||[];});
    if(!ST.study?.gus) ST.study=defaultState().study;
    if(!ST.monthActuals) ST.monthActuals={};
    if(!ST.taskChecks) ST.taskChecks={};
    localStorage.setItem('lifeos_v5',JSON.stringify(ST));
    GH_READY=true; setSyncUI('ok','sincronizado'); render(); return true;
  }catch(e){console.error(e);setSyncUI('err','erro ao carregar');return false;}
}
let ghTimer=null;
function scheduleSave(){clearTimeout(ghTimer);ghTimer=setTimeout(ghSave,800);}
async function ghSave(){
  try{localStorage.setItem('lifeos_v5',JSON.stringify(ST));}catch(e){}
  if(!ghConfigured()){setSyncUI('err','Token não configurado');return;}
  setSyncUI('syncing','salvando...');
  try{
    if(!GH_SHA){
      const c=await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_FILE}?ref=${GH_BRANCH}&t=${Date.now()}`,{headers:ghHeaders(),cache:'no-store'});
      if(c.ok){const j=await c.json();GH_SHA=j.sha;}
    }
    const body={message:'update Life OS',content:enc(JSON.stringify(ST,null,2)),branch:GH_BRANCH};
    if(GH_SHA) body.sha=GH_SHA;
    const res=await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_FILE}`,{method:'PUT',headers:ghHeaders(),body:JSON.stringify(body)});
    if(!res.ok) throw new Error('HTTP '+res.status+' '+await res.text());
    const j=await res.json(); GH_SHA=j.content.sha;
    setSyncUI('ok','salvo');
  }catch(e){console.error(e);setSyncUI('err','erro ao salvar');}
}

// ══════════════════════════════════════════════════════════
// FINANCE CALCULATIONS
// ══════════════════════════════════════════════════════════
function cardBillingMonth(purchaseDate,closingDay){
  const [y,m,d]=purchaseDate.split('-').map(Number);
  return d<=closingDay ? ymFrom(y,m) : ymFrom(y,m+1);
}
function cardEntriesForMonth(mk){
  const cl=Number(ST.cardClosingDay)||20;
  const res=[];
  for(const c of (ST.cardExpenses||[])){
    const total=Number(c.totalParcels)||1;
    const billing0=cardBillingMonth(c.purchaseDate,cl);
    for(let p=0;p<total;p++){
      const parcelKey=ymAdd(billing0,p);
      if(parcelKey===mk) res.push({
        id:c.id+'_'+p, cardId:c.id,
        name:c.name+(total>1?` (${p+1}/${total})`:''),
        value:Number(c.value)/total,
        category:c.category||'essenciais',
        owner:c.owner||'casal',
        type:'expense', isCard:true,
        totalParcels:total, purchaseDate:c.purchaseDate
      });
    }
  }
  return res;
}
function recurringForMonth(mk){
  return (ST.recurring||[]).filter(r=>r.active!==false).map(r=>({
    id:'rec_'+r.id, recId:r.id, name:r.name,
    value:Number(r.value)||0, category:r.category,
    type:r.type||'expense', owner:r.owner||'casal',
    isRecurring:true
  }));
}
function monthKeys(){
  const set=new Set([ym(0),ym(1),ym(2),ym(3),ym(4),ym(5)]);
  (ST.entries||[]).forEach(e=>set.add(e.month));
  Object.keys(ST.monthActuals||{}).forEach(k=>set.add(k));
  return [...set].sort();
}
function monthSummary(key){
  const sal=(Number(ST.salaries.gus)||0)+(Number(ST.salaries.maria)||0);
  const incomeActual=Number(ST.monthActuals?.[key]?.incomeActual)||0;
  const manual=(ST.entries||[]).filter(e=>e.month===key);
  const recur=recurringForMonth(key);
  const card=cardEntriesForMonth(key);
  const allExp=[...manual,...recur.map(r=>({...r,projected:r.value,actual:0})),...card.map(c=>({...c,projected:c.value,actual:0}))];
  const expProj=allExp.filter(e=>e.type!=='investment').reduce((a,e)=>a+Number(e.projected||e.value||0),0);
  const invProj=allExp.filter(e=>e.type==='investment').reduce((a,e)=>a+Number(e.projected||e.value||0),0);
  const expAct=manual.filter(e=>e.type==='expense').reduce((a,e)=>a+Number(e.actual||0),0);
  const invAct=manual.filter(e=>e.type==='investment').reduce((a,e)=>a+Number(e.actual||0),0);
  const catTotals={};
  allExp.forEach(e=>{catTotals[e.category]=(catTotals[e.category]||0)+Number(e.projected||e.value||0);});
  const byOwner={p1:0,p2:0,casal:0};
  allExp.filter(e=>e.type!=='investment').forEach(e=>{
    const v=Number(e.projected||e.value||0);
    if(e.owner==='p1'||e.owner===ST.name1?.toLowerCase()) byOwner.p1+=v;
    else if(e.owner==='p2'||e.owner===ST.name2?.toLowerCase()) byOwner.p2+=v;
    else byOwner.casal+=v;
  });
  return {
    sal, incomeActual,
    expProj, invProj, expAct, invAct,
    balProj:sal-expProj-invProj,
    balAct:(incomeActual||sal)-expAct-invAct,
    catTotals, byOwner, manual, recur, card,
    cardTotal:card.reduce((a,c)=>a+c.value,0),
    recurTotal:recur.reduce((a,r)=>a+r.value,0),
    manualExpTotal:manual.filter(e=>e.type==='expense').reduce((a,e)=>a+Number(e.projected||0),0),
  };
}

// ══════════════════════════════════════════════════════════
// ALERTS / INSIGHTS ENGINE
// ══════════════════════════════════════════════════════════
function generateInsights(){
  const s=monthSummary(selMonth);
  const insights=[];
  const income=s.sal;
  // categories over budget
  ST.rules.forEach(r=>{
    const target=income*r.pct/100;
    const used=s.catTotals[r.id]||0;
    if(used>target*1.05) insights.push({type:'bad',icon:'⚠️',text:`<strong>${r.name}</strong> ${fmtShort(used)} (${Math.round(used/target*100)}% do alvo de ${fmtShort(target)})`});
    else if(used>target*0.9&&used<=target*1.05) insights.push({type:'warn',icon:'🟡',text:`<strong>${r.name}</strong> quase no limite: ${fmtShort(used)} de ${fmtShort(target)}`});
  });
  // balance
  if(s.balProj<0) insights.push({type:'bad',icon:'🔴',text:`Déficit projetado de <strong>${fmt(Math.abs(s.balProj))}</strong> este mês`});
  else if(s.balProj>0) insights.push({type:'good',icon:'💚',text:`Sobra projetada de <strong>${fmt(s.balProj)}</strong> — ótimo!`});
  // card commitments next months
  const futCard=[1,2,3].map(o=>{const mk=ym(o);const ce=cardEntriesForMonth(mk);return {label:shortYm(mk),total:ce.reduce((a,c)=>a+c.value,0)};}).filter(x=>x.total>0);
  if(futCard.length) insights.push({type:'info',icon:'💳',text:`Parcelas futuras: ${futCard.map(f=>`${f.label} ${fmtShort(f.total)}`).join(' · ')}`});
  // goals reachable
  const avgSurplus=monthKeys().reduce((a,k)=>a+Math.max(0,monthSummary(k).balProj),0)/Math.max(1,monthKeys().length);
  ST.goals.filter(g=>!g.completedAt).forEach(g=>{
    const rem=Number(g.target)-Number(g.current);
    if(rem>0&&avgSurplus>0){const mo=Math.ceil(rem/avgSurplus);if(mo<=24)insights.push({type:'info',icon:'🎯',text:`Meta <strong>${esc(g.name)}</strong>: ~${mo} meses para atingir (sobra média ${fmtShort(avgSurplus)}/mês)`});}
  });
  return insights;
}

function renderDashboard(s){
  const income=s.sal;
  const pct=income?Math.min(100,Math.round((s.expProj+s.invProj)/income*100)):0;
  const barCol=pct>90?'var(--red)':pct>75?'var(--orange)':'var(--green)';
  const circ=2*Math.PI*52;
  const insights=generateInsights();

  // Chart: last 6 months
  const chartMonths=monthKeys().slice(-6);
  const chartMax=Math.max(...chartMonths.map(k=>{const ms=monthSummary(k);return ms.sal;}),1);
  const bw=38,gap=14,chartW=chartMonths.length*(bw*2+gap+4)+gap,chartH=120;

  const chartSvg=`<svg class="chart" width="${chartW}" height="${chartH+30}" viewBox="0 0 ${chartW} ${chartH+30}">
    ${chartMonths.map((k,i)=>{
      const ms=monthSummary(k);
      const h1=Math.round(ms.sal/chartMax*chartH)||2;
      const h2=Math.round((ms.expProj+ms.invProj)/chartMax*chartH)||2;
      const h3=Math.round(Math.max(0,ms.balProj)/chartMax*chartH)||2;
      const x=gap+i*(bw*2+gap+4);
      const active=k===selMonth;
      return `
        <rect x="${x}" y="${chartH-h1}" width="${bw}" height="${h1}" rx="5" fill="${active?'var(--blue)':'rgba(56,189,248,.35)'}" style="cursor:pointer" onclick="selMonth='${k}';render()"/>
        <rect x="${x+bw+2}" y="${chartH-h2}" width="${bw}" height="${h2}" rx="5" fill="${active?'var(--orange)':'rgba(251,146,60,.35)'}" style="cursor:pointer" onclick="selMonth='${k}';render()"/>
        <text x="${x+bw+1}" y="${chartH+18}" text-anchor="middle" fill="var(--muted)" font-size="11" font-family="var(--font-mono)">${shortYm(k)}</text>
      `;
    }).join('')}
    <line x1="0" y1="${chartH}" x2="${chartW}" y2="${chartH}" stroke="var(--border)" stroke-width="1"/>
  </svg>
  <div style="display:flex;gap:14px;margin-top:8px;font-size:12px;color:var(--muted)">
    <span><span style="display:inline-block;width:10px;height:10px;border-radius:3px;background:var(--blue);margin-right:4px"></span>Receita</span>
    <span><span style="display:inline-block;width:10px;height:10px;border-radius:3px;background:var(--orange);margin-right:4px"></span>Gastos + Invest.</span>
  </div>`;

  return `<div class="grid">
  <!-- ring + composição -->
  <div class="card s4" style="display:flex;flex-direction:column;align-items:center;gap:16px">
    <div class="card-title" style="margin-bottom:0;align-self:flex-start">Orçamento ${shortYm(selMonth)}</div>
    <svg width="130" height="130" viewBox="0 0 130 130">
      <circle cx="65" cy="65" r="52" fill="none" stroke="var(--panel3)" stroke-width="12"/>
      <circle cx="65" cy="65" r="52" fill="none" stroke="${barCol}" stroke-width="12"
        stroke-dasharray="${circ}" stroke-dashoffset="${circ*(1-pct/100)}"
        stroke-linecap="round" transform="rotate(-90 65 65)" style="transition:.6s"/>
      <text x="65" y="60" text-anchor="middle" fill="var(--text)" font-size="26" font-weight="800" font-family="var(--font-display)">${pct}%</text>
      <text x="65" y="78" text-anchor="middle" fill="var(--muted)" font-size="11">do salário</text>
    </svg>
    <div style="text-align:center">
      <div style="font-size:22px;font-weight:800;color:${s.balProj>=0?'var(--green)':'var(--red)'};font-family:var(--font-display)">${fmt(s.balProj)}</div>
      <div style="font-size:12px;color:var(--muted);margin-top:2px">${s.balProj>=0?'sobra projetada':'déficit projetado'}</div>
    </div>
  </div>

  <!-- composição -->
  <div class="card s4">
    <div class="card-title">Composição do mês</div>
    ${[
      {label:'🔁 Recorrentes',val:s.recurTotal,col:'var(--orange)'},
      {label:'💳 Cartão',val:s.cardTotal,col:'var(--purple)'},
      {label:'➕ Avulsos',val:s.manualExpTotal,col:'var(--muted)'},
      {label:'📈 Investimentos',val:s.invProj,col:'var(--green)'},
    ].map(x=>{const w=income?Math.min(100,x.val/income*100):0;return `
    <div style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px">
        <span>${x.label}</span><span style="font-family:var(--font-mono);font-weight:700;color:${x.col}">${fmt(x.val)}</span>
      </div>
      <div class="bar"><div class="bar-fill" style="width:${w}%;background:${x.col}"></div></div>
    </div>`;}).join('')}
  </div>

  <!-- pessoa × pessoa -->
  <div class="card s4">
    <div class="card-title">${ST.name1} × ${ST.name2}</div>
    ${[
      {name:ST.name1,val:s.byOwner.p1,sal:ST.salaries.gus,col:'var(--blue)'},
      {name:ST.name2,val:s.byOwner.p2,sal:ST.salaries.maria,col:'var(--purple)'},
      {name:'Casal (÷2)',val:s.byOwner.casal/2,sal:income/2,col:'var(--green)'},
    ].map(p=>{
      const p2=p.sal?Math.min(100,Math.round(p.val/p.sal*100)):0;
      return `<div style="margin-bottom:14px">
        <div style="display:flex;justify-content:space-between;margin-bottom:3px">
          <span style="font-weight:700;color:${p.col}">${esc(p.name)}</span>
          <span style="font-family:var(--font-mono);font-weight:700">${fmt(p.val)}</span>
        </div>
        <div class="bar"><div class="bar-fill" style="width:${p2}%;background:${p.col}"></div></div>
        <div style="font-size:11px;color:var(--muted)">${p2}% do salário individual</div>
      </div>`;}).join('')}
  </div>

  <!-- chart -->
  <div class="card s8">
    <div class="card-title">Histórico — 6 meses</div>
    <div class="chart-wrap">${chartSvg}</div>
  </div>

  <!-- próximos meses -->
  <div class="card s4">
    <div class="card-title">Próximos meses</div>
    ${[1,2,3].map(o=>{
      const mk=ym(o);const ms=monthSummary(mk);
      return `<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)">
        <div>
          <div style="font-weight:700">${shortYm(mk)}</div>
          <div style="font-size:11px;color:var(--muted)">💳 ${fmt(cardEntriesForMonth(mk).reduce((a,c)=>a+c.value,0))} parcelas</div>
        </div>
        <div>
          <div style="font-family:var(--font-mono);font-weight:700;font-size:15px;text-align:right">${fmt(ms.expProj+ms.invProj)}</div>
          <div style="font-size:11px;color:${ms.balProj>=0?'var(--green)':'var(--red)'};text-align:right">${ms.balProj>=0?'sobra ':'déficit '}${fmtShort(Math.abs(ms.balProj))}</div>
        </div>
      </div>`;}).join('')}
  </div>

  <!-- insights -->
  <div class="card s12">
    <div class="card-title">Insights automáticos</div>
    ${insights.length?insights.map(i=>`<div class="alert ${i.type}"><span class="alert-icon">${i.icon}</span><span>${i.text}</span></div>`).join(''):'<div style="color:var(--muted);font-size:13px">Tudo certo por aqui! Sem alertas no momento.</div>'}
  </div>
  </div>`;
}

// ── Months ────────────────────────────────────────────────
function renderMonths(){
  const keys=monthKeys();
  return `<div class="grid"><div class="card s12">
    <div class="card-title">Timeline financeira</div>
    <div class="month-grid">
    ${keys.map(k=>{
      const s=monthSummary(k);const active=k===selMonth;
      const pct=s.sal?Math.min(100,Math.round((s.expProj+s.invProj)/s.sal*100)):0;
      const col=pct>90?'var(--red)':pct>75?'var(--orange)':'var(--green)';
      return `<div class="mcard ${active?'active':''}" onclick="selMonth='${k}';render()">
        <div>
          <div class="mcard-title">${ymLabel(k)}</div>
          <div class="mcard-sub">
            <span class="mkpi">🔁 ${s.recur.length} recorr.</span>
            <span class="mkpi">💳 ${s.card.length} parcelas</span>
            <span class="mkpi">➕ ${s.manual.length} avulsos</span>
          </div>
          <div class="bar" style="margin-top:8px"><div class="bar-fill" style="width:${pct}%;background:${col}"></div></div>
        </div>
        <div class="mcard-stat"><div class="lbl">Receita</div><div class="val b">${fmtShort(s.sal)}</div></div>
        <div class="mcard-stat"><div class="lbl">Gastos proj.</div><div class="val o">${fmtShort(s.expProj)}</div></div>
        <div class="mcard-stat"><div class="lbl">Saldo proj.</div><div class="val ${s.balProj>=0?'g':'r'}">${fmtShort(s.balProj)}</div></div>
        <div style="display:flex;gap:6px">
          <button class="btn sm ghost" onclick="event.stopPropagation();selMonth='${k}';setFinTab('compare')">Ver</button>
          <button class="btn sm" onclick="event.stopPropagation();openMonthEdit('${k}')">Real</button>
        </div>
      </div>`;
    }).join('')}
    </div>
  </div></div>`;
}

// ── Compare ───────────────────────────────────────────────
function renderCompare(s){
  const allRows=[
    ...s.recur.map(r=>({name:'🔁 '+r.name,proj:r.value,real:0,owner:r.owner,auto:true})),
    ...s.card.map(c=>({name:'💳 '+c.name,proj:c.value,real:0,owner:c.owner,auto:true})),
    ...s.manual.map(e=>({name:e.name,proj:Number(e.projected||0),real:Number(e.actual||0),owner:e.owner,auto:false,id:e.id})),
  ];
  const diffBal=s.balAct-s.balProj;
  return `<div class="grid">
  <div class="card s8">
    <div class="card-title">Lançamentos — ${ymLabel(selMonth)}</div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>Item</th><th>Responsável</th><th>Projetado</th><th>Realizado</th><th>Δ</th></tr></thead>
      <tbody>
        ${allRows.map(r=>{
          const diff=r.real-r.proj;
          return `<tr>
            <td>${esc(r.name)}${r.auto?'<span class="pill dim" style="margin-left:6px;font-size:10px">auto</span>':''}</td>
            <td><span class="pill ${ownerPill(r.owner)}">${ownerLabel(r.owner)}</span></td>
            <td class="num">${fmt(r.proj)}</td>
            <td class="num">${fmt(r.real)}</td>
            <td class="num ${diff===0?'':diff<0?'g':'r'}">${diff>=0?'+':''}${fmt(diff)}</td>
          </tr>`;}).join('')}
        <tr style="font-weight:900;border-top:2px solid var(--border2)">
          <td colspan="2"><strong>SALDO FINAL</strong></td>
          <td class="num">${fmt(s.balProj)}</td>
          <td class="num ${s.balAct>=0?'g':'r'}">${fmt(s.balAct)}</td>
          <td class="num ${diffBal>=0?'g':'r'}">${diffBal>=0?'+':''}${fmt(diffBal)}</td>
        </tr>
      </tbody>
    </table></div>
    <div class="btn-row"><button class="btn" onclick="openMonthEdit('${selMonth}')">Editar realizado</button></div>
  </div>
  <div class="card s4">
    <div class="card-title">Resumo do mês</div>
    <div class="cmp-grid">
      <div class="cmp-box"><div class="n">Receita proj.</div><div class="v">${fmt(s.sal)}</div></div>
      <div class="cmp-box"><div class="n">Receita real</div><div class="v">${fmt(s.incomeActual||s.sal)}</div></div>
      <div class="cmp-box"><div class="n">Gastos proj.</div><div class="v" style="color:var(--orange)">${fmt(s.expProj)}</div></div>
      <div class="cmp-box ${s.expAct>s.expProj?'lo':''}"><div class="n">Gastos reais</div><div class="v" style="color:${s.expAct>s.expProj?'var(--red)':'var(--green)'}">${fmt(s.expAct)}</div></div>
      <div class="cmp-box"><div class="n">Invest. proj.</div><div class="v" style="color:var(--green)">${fmt(s.invProj)}</div></div>
      <div class="cmp-box"><div class="n">Invest. real</div><div class="v" style="color:var(--green)">${fmt(s.invAct)}</div></div>
      <div class="cmp-box ${s.balAct>=0?'hi':'lo'}" style="grid-column:span 2"><div class="n">Saldo final</div><div class="v" style="color:${s.balAct>=0?'var(--green)':'var(--red)'}">${fmt(s.balAct)}</div></div>
    </div>
  </div></div>`;
}

// ── Entries (manual) ──────────────────────────────────────
function renderEntries(s){
  return `<div class="grid">
  <div class="card s7">
    <div class="card-title">Lançamentos avulsos — ${ymLabel(selMonth)}</div>
    <p style="color:var(--muted);font-size:13px;margin-bottom:14px">Para gastos fixos use <strong>Recorrentes</strong> · Para cartão use <strong>Cartão</strong></p>
    ${s.manual.length?s.manual.map(e=>`<div class="row">
      <div style="flex:1">
        <div class="row-title">${esc(e.name)}</div>
        <div class="row-sub">${e.type==='expense'?'Gasto':'Invest.'} · ${catName(e.category)} · <span class="pill ${ownerPill(e.owner)}">${ownerLabel(e.owner)}</span></div>
        ${e.note?`<div style="font-size:12px;color:var(--dim);margin-top:3px">📝 ${esc(e.note)}</div>`:''}
      </div>
      <div style="text-align:right">
        <div class="row-val">${fmt(e.projected)}</div>
        <div style="font-size:12px;color:var(--muted)">real: ${fmt(e.actual||0)}</div>
      </div>
      <button class="btn sm ghost" onclick="removeEntry(${e.id})">×</button>
    </div>`).join(''):'<p style="color:var(--muted)">Nenhum lançamento avulso este mês.</p>'}
  </div>
  <div class="card s5">
    <div class="card-title">Novo lançamento</div>
    <div class="fg">
      <div class="f12"><label class="label">Descrição</label><input id="en" class="inp" placeholder="Ex: IPVA, presente, jantar..."></div>
      <div class="f6"><label class="label">Tipo</label><select id="et" class="sel"><option value="expense">Gasto</option><option value="investment">Investimento</option></select></div>
      <div class="f6"><label class="label">Categoria</label><select id="ec" class="sel">${ST.rules.map(r=>`<option value="${r.id}">${esc(r.name)}</option>`).join('')}</select></div>
      <div class="f6"><label class="label">Projetado</label><input id="ep" class="inp" type="number" placeholder="0"></div>
      <div class="f6"><label class="label">Realizado</label><input id="er" class="inp" type="number" placeholder="0"></div>
      <div class="f12"><label class="label">Responsável</label><select id="eo" class="sel"><option value="casal">Casal</option><option value="p1">${esc(ST.name1)}</option><option value="p2">${esc(ST.name2)}</option></select></div>
      <div class="f12"><label class="label">Nota (opcional)</label><input id="enote" class="inp" placeholder="Observação..."></div>
    </div>
    <button class="btn g" style="width:100%" onclick="addEntry()">Adicionar lançamento</button>
  </div></div>`;
}
function addEntry(){
  const name=document.getElementById('en').value.trim();
  if(!name){toast('Digite a descrição','err');return;}
  (ST.entries||[]).push({id:Date.now(),month:selMonth,name,type:document.getElementById('et').value,category:document.getElementById('ec').value,projected:Number(document.getElementById('ep').value)||0,actual:Number(document.getElementById('er').value)||0,owner:document.getElementById('eo').value,note:document.getElementById('enote').value||''});
  save();toast('Lançamento adicionado');render();
}
function removeEntry(id){ST.entries=(ST.entries||[]).filter(e=>e.id!==id);save();render();}

// ── Recurring ─────────────────────────────────────────────
function renderRecurring(){
  const total=(ST.recurring||[]).filter(r=>r.active!==false).reduce((a,r)=>a+Number(r.value||0),0);
  return `<div class="grid">
  <div class="card s7">
    <div class="card-title">Gastos recorrentes mensais</div>
    <p style="color:var(--muted);font-size:13px;margin-bottom:14px">Somados automaticamente em <strong>todos os meses</strong>.</p>
    ${(ST.recurring||[]).length?(ST.recurring||[]).map(r=>`<div class="row" style="opacity:${r.active!==false?1:.45}">
      <label class="toggle"><input type="checkbox" ${r.active!==false?'checked':''} onchange="toggleRec(${r.id},this.checked)"><div class="toggle-slider"></div></label>
      <div style="flex:1">
        <div class="row-title">🔁 ${esc(r.name)}</div>
        <div class="row-sub">${catName(r.category)} · ${ownerLabel(r.owner)} · ${r.type==='investment'?'Investimento':'Gasto'}</div>
      </div>
      <div class="row-val" style="color:var(--orange)">${fmt(r.value)}<span style="font-size:12px;color:var(--muted)">/mês</span></div>
      <button class="btn sm ghost" onclick="removeRec(${r.id})">×</button>
    </div>`).join(''):'<p style="color:var(--muted)">Nenhum recorrente cadastrado.</p>'}
    <div style="margin-top:14px;padding:14px;background:var(--panel2);border-radius:var(--r);font-size:13px">
      Total automático/mês: <strong style="color:var(--orange);font-size:16px;font-family:var(--font-mono)">${fmt(total)}</strong>
    </div>
  </div>
  <div class="card s5">
    <div class="card-title">Novo recorrente</div>
    <div class="fg">
      <div class="f12"><label class="label">Descrição</label><input id="rn" class="inp" placeholder="Ex: Aluguel, Netflix..."></div>
      <div class="f12"><label class="label">Valor mensal</label><input id="rv" class="inp" type="number" placeholder="0"></div>
      <div class="f6"><label class="label">Tipo</label><select id="rt" class="sel"><option value="expense">Gasto</option><option value="investment">Investimento</option></select></div>
      <div class="f6"><label class="label">Categoria</label><select id="rc" class="sel">${ST.rules.map(r=>`<option value="${r.id}">${esc(r.name)}</option>`).join('')}</select></div>
      <div class="f12"><label class="label">Responsável</label><select id="ro" class="sel"><option value="casal">Casal</option><option value="p1">${esc(ST.name1)}</option><option value="p2">${esc(ST.name2)}</option></select></div>
    </div>
    <button class="btn g" style="width:100%" onclick="addRec()">Adicionar recorrente</button>
  </div></div>`;
}
function addRec(){
  const name=document.getElementById('rn').value.trim();
  const val=Number(document.getElementById('rv').value)||0;
  if(!name||!val){toast('Preencha nome e valor','err');return;}
  if(!ST.recurring) ST.recurring=[];
  ST.recurring.push({id:Date.now(),name,value:val,type:document.getElementById('rt').value,category:document.getElementById('rc').value,owner:document.getElementById('ro').value,active:true});
  save();toast('Recorrente adicionado');render();
}
function removeRec(id){ST.recurring=(ST.recurring||[]).filter(r=>r.id!==id);save();render();}
function toggleRec(id,val){ST.recurring=(ST.recurring||[]).map(r=>r.id===id?{...r,active:val}:r);save();render();}

// ── Card ──────────────────────────────────────────────────
function renderCard(){
  const cl=Number(ST.cardClosingDay)||20;
  const sorted=[...(ST.cardExpenses||[])].sort((a,b)=>b.purchaseDate.localeCompare(a.purchaseDate));
  return `<div class="grid">
  <div class="card s7">
    <div class="card-title">Compras no cartão</div>
    <p style="color:var(--muted);font-size:13px;margin-bottom:14px">Parcelas distribuídas automaticamente (fechamento dia <strong>${cl}</strong>).</p>
    ${sorted.length?sorted.map(c=>{
      const total=Number(c.totalParcels)||1;
      const billing0=cardBillingMonth(c.purchaseDate,cl);
      const lastBilling=ymAdd(billing0,total-1);
      return `<div class="row">
        <div style="flex:1">
          <div class="row-title">💳 ${esc(c.name)}</div>
          <div class="row-sub">${c.purchaseDate} · <span class="pill ${ownerPill(c.owner)}">${ownerLabel(c.owner)}</span></div>
          <div style="font-size:12px;color:var(--purple);margin-top:3px">${total}× de ${fmt(Number(c.value)/total)} · Fatura: ${shortYm(billing0)}${total>1?' → '+shortYm(lastBilling):''}</div>
          ${c.note?`<div style="font-size:11px;color:var(--dim);margin-top:2px">📝 ${esc(c.note)}</div>`:''}
        </div>
        <div style="text-align:right">
          <div class="row-val" style="color:var(--purple)">${fmt(c.value)}</div>
          <div style="font-size:11px;color:var(--muted)">total</div>
        </div>
        <button class="btn sm ghost" onclick="removeCard(${c.id})">×</button>
      </div>`;}).join(''):'<p style="color:var(--muted)">Nenhuma compra lançada.</p>'}
  </div>
  <div class="card s5">
    <div class="card-title">Nova compra</div>
    <div class="fg">
      <div class="f12"><label class="label">Descrição</label><input id="cn" class="inp" placeholder="Ex: Notebook, viagem..."></div>
      <div class="f12"><label class="label">Valor total</label><input id="cv" class="inp" type="number" placeholder="0"></div>
      <div class="f6"><label class="label">Parcelas</label><input id="cp" class="inp" type="number" min="1" max="60" value="1"></div>
      <div class="f6"><label class="label">Data da compra</label><input id="cd" class="inp" type="date" value="${today()}"></div>
      <div class="f6"><label class="label">Categoria</label><select id="cc" class="sel">${ST.rules.map(r=>`<option value="${r.id}">${esc(r.name)}</option>`).join('')}</select></div>
      <div class="f6"><label class="label">Responsável</label><select id="co" class="sel"><option value="casal">Casal</option><option value="p1">${esc(ST.name1)}</option><option <option value="p2">${esc(ST.name2)}</option></select></div>
      <div class="f12"><label class="label">Nota</label><input id="cnote" class="inp" placeholder="Opcional"></div>
    </div>
    <button class="btn p" style="width:100%;margin-bottom:12px" onclick="addCard()">💳 Lançar compra</button>
    <div style="background:var(--panel2);border-radius:var(--r);padding:12px;font-size:12px;color:var(--muted)">
      <strong style="color:var(--text)">📅 Fechamento dia ${cl}</strong><br>
      Até dia ${cl} → fatura deste mês<br>
      Após dia ${cl} → fatura do próximo mês<br>
      <div style="margin-top:8px"><label class="label">Alterar fechamento</label>
        <input class="inp" type="number" min="1" max="31" value="${cl}" style="margin-top:4px" onchange="ST.cardClosingDay=Number(this.value)||20;save();render()">
      </div>
    </div>
  </div></div>`;
}
function addCard(){
  const name=document.getElementById('cn').value.trim();
  const val=Number(document.getElementById('cv').value)||0;

function removeCard(id){ST.cardExpenses=(ST.cardExpenses||[]).filter(c=>c.id!==id);save();render();}

// ── Rules ─────────────────────────────────────────────────

      const target=income*r.pct/100;
      const used=s.catTotals[r.id]||0;
      const pct2=target?Math.min(140,used/target*100):0;
      const col=pct2>100?'var(--red)':pct2>90?'var(--orange)':'var(--'+r.color+')';
      return `<div style="margin-bottom:18px">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px">

        <div style="font-size:12px;color:${used>target?'var(--red)':used>target*.9?'var(--orange)':'var(--muted)'}">
          ${fmt(used)} usado ${pct2>100?'⚠️ acima do alvo':pct2>90?'🟡 quase no limite':''}

      <div class="f6"><label class="label">Salário ${esc(ST.name2)}</label><input class="inp" type="number" value="${ST.salaries.maria}" onchange="ST.salaries.maria=Number(this.value)||0;save();render()"></div>
    </div>
    ${ST.rules.map(r=>`<div class="fg" style="margin-bottom:0;margin-top:8px">
      <div class="f8"><input class="inp sm" value="${esc(r.name)}" onchange="updRule('${r.id}','name',this.value)"></div>
      <div class="f3"><div style="display:flex;align-items:center;gap:4px"><input class="inp sm" type="number" value="${r.pct}" onchange="updRule('${r.id}','pct',this.value)"><span style="color:var(--muted);white-space:nowrap">%</span></div></div>
    </div>`).join('')}
    <p style="color:var(--muted);font-size:12px;margin-top:12px">Total: ${ST.rules.reduce((a,r)=>a+(Number(r.pct)||0),0)}% ${ST.rules.reduce((a,r)=>a+(Number(r.pct)||0),0)===100?'✓':'⚠️ deve somar 100%'}</p>
  </div></div>`;
}
function updRule(id,field,val){ST.rules=ST.rules.map(r=>r.id===id?{...r,[field]:field==='pct'?Number(val)||0:val}:r);save();render();}

// ── Goals ─────────────────────────────────────────────────
function renderGoals(){
  const keys=monthKeys();
  const avgSurplus=keys.reduce((a,k)=>a+Math.max(0,monthSummary(k).balProj),0)/Math.max(1,keys.length);
  const active=ST.goals.filter(g=>!g.completedAt);
  const done=ST.goals.filter(g=>g.completedAt);
  return `<div class="grid">
  <div class="card s7">
    <div class="card-title">Metas em andamento</div>
    ${active.length?active.map(g=>{
      const pct=g.target?Math.min(100,Number(g.current)/Number(g.target)*100):0;
      const rem=Number(g.target)-Number(g.current);
      const months=avgSurplus>0&&rem>0?Math.ceil(rem/avgSurplus):null;
      return `<div class="goal-row">
        <div class="goal-header">
          <div>
            <div class="goal-name">${esc(g.name)}</div>
            ${months?`<div class="goal-meta">~${months} meses para atingir · sobra média ${fmtShort(avgSurplus)}/mês</div>`:''}
          </div>
          <div style="text-align:right">
            <div class="goal-pct">${Math.round(pct)}%</div>
            <div style="font-size:12px;color:var(--muted)">${fmt(g.current)} / ${fmt(g.target)}</div>
          </div>
        </div>
        <div class="bar"><div class="bar-fill" style="width:${pct}%;background:var(--green)"></div></div>
        <div style="display:flex;gap:6px;margin-top:8px">
          <button class="btn sm ghost" onclick="openGoalEdit(${g.id})">Editar</button>
          ${pct>=100?`<button class="btn sm g" onclick="completeGoal(${g.id})">✓ Concluída!</button>`:''}
        </div>
      </div>`;}).join(''):'<p style="color:var(--muted)">Nenhuma meta cadastrada.</p>'}
    ${done.length?`<div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--border)">
      <div class="card-title">🏆 Metas concluídas</div>
      ${done.map(g=>`<div class="row" style="opacity:.6">
        <span style="font-size:18px">🏆</span>
        <div style="flex:1"><div class="row-title">${esc(g.name)}</div><div class="row-sub">Concluída em ${g.completedAt||'—'} · ${fmt(g.target)}</div></div>
        <button class="btn sm ghost" onclick="ST.goals=ST.goals.filter(x=>x.id!==${g.id});save();render()">×</button>
      </div>`).join('')}
    </div>`:''}
  </div>
  <div class="card s5">
    <div class="card-title">Nova meta</div>
    <div class="fg">
      <div class="f12"><label class="label">Nome</label><input id="gn" class="inp" placeholder="Ex: Reserva de emergência"></div>
      <div class="f6"><label class="label">Valor atual</label><input id="gc" class="inp" type="number" placeholder="0"></div>
      <div class="f6"><label class="label">Objetivo</label><input id="gt" class="inp" type="number" placeholder="30000"></div>
    </div>
    <button class="btn g" style="width:100%" onclick="addGoal()">Adicionar meta</button>
    ${avgSurplus>0?`<div style="margin-top:14px;padding:12px;background:var(--panel2);border-radius:var(--r);font-size:13px;color:var(--muted)">
      💡 Sobra média projetada: <strong style="color:var(--green)">${fmt(avgSurplus)}/mês</strong>
    </div>`:''}
  </div></div>`;
}
function addGoal(){
  const name=document.getElementById('gn').value.trim();
  if(!name){toast('Digite a meta','err');return;}
  ST.goals.push({id:Date.now(),name,current:Number(document.getElementById('gc').value)||0,target:Number(document.getElementById('gt').value)||0,completedAt:null});
  save();render();
}
function completeGoal(id){
  ST.goals=ST.goals.map(g=>g.id===id?{...g,completedAt:today()}:g);
  save();toast('🏆 Meta concluída! Parabéns!');render();
}

// ── Helpers ───────────────────────────────────────────────
function catName(id){return ST.rules.find(r=>r.id===id)?.name||id;}
function ownerLabel(o){if(o==='p1')return ST.name1;if(o==='p2')return ST.name2;if(o==='casal')return 'Casal';return o;}
function ownerPill(o){return o==='p1'?'b':o==='p2'?'p':'g';}

function exportCSV(){
  const s=monthSummary(selMonth);
  const rows=[['Tipo','Nome','Projetado','Realizado','Categoria','Responsável']];
  [...s.recur,...s.card,...s.manual].forEach(e=>{
    rows.push([e.isRecurring?'Recorrente':e.isCard?'Cartão':'Manual',e.name,Number(e.projected||e.value||0).toFixed(2),Number(e.actual||0).toFixed(2),catName(e.category),ownerLabel(e.owner)]);
  });
  const csv=rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='lifeos-'+selMonth+'.csv';a.click();
}

          <div class="row-title" style="${done?'text-decoration:line-through':''}">${esc(t.name)}</div>

  <div class="card s5">

      <div class="f6"><label class="label">Responsável</label><select id="to" class="sel"><option value="p1">${esc(ST.name1)}</option><option value="p2">${esc(ST.name2)}</option><option value="ambos">Ambos</option></select></div>

function addTask(){
  const name=document.getElementById('tn').value.trim();
  const sel=[...document.querySelectorAll('.dc:checked')].map(x=>Number(x.value));

  ST.tasks.push({id:Date.now(),name,days:sel,owner:document.getElementById('to').value,time:document.getElementById('tt').value||'Livre'});
  save();render();
}

function sumH(p){return (ST.study[p]?.sessions||[]).reduce((a,s)=>a+Number(s.hours||0),0);}

function addStudy(p){
  const h=Number(document.getElementById('sh-'+p).value)||0;
  const note=document.getElementById('sn-'+p).value.trim();

  ST.study[p].sessions.push({date:today(),hours:h,note});
  save();toast('Sessão registrada!');render();
}

function saveGhToken(){
  const val=(document.getElementById('gh-tok')?.value||'').trim();

function clearGhToken(){
  localStorage.removeItem(GH_TOKEN_KEY);GH_SHA=null;GH_READY=false;
  setSyncUI('err','Token removido');toast('Token removido');render();
}
function exportJSON(){
  const blob=new Blob([JSON.stringify(ST,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='lifeos-backup-'+today()+'.json';a.click();
}
function importJSON(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{try{ST={...defaultState(),...JSON.parse(ev.target.result)};save();render();toast('Dados importados!');}catch{toast('Arquivo invalido','err');}};
  reader.readAsText(file);
}

  openModal(`<div class="modal-title">Resetar todos os dados?</div>

    <div class="btn-row">
      <button class="btn g" onclick="saveGoalEdit(${id})">Salvar</button>
      <button class="btn r" onclick="ST.goals=ST.goals.filter(x=>x.id!==${id});save();closeModal();render()">Excluir</button>
      <button class="btn ghost" onclick="closeModal()">Cancelar</button>
    </div>`);
}
function saveGoalEdit(id){
  ST.goals=ST.goals.map(g=>g.id===id?{...g,name:document.getElementById('ge-n').value,current:Number(document.getElementById('ge-c').value)||0,target:Number(document.getElementById('ge-t').value)||0}:g);
  save();closeModal();render();
}

render();
setSyncUI('syncing','iniciando...');
if(!ST.onboarded){
  showOnboarding();
} else {
  ghLoad();
}
</script>
